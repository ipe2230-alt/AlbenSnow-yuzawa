<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ALBEN SNOW｜日本湯澤中文單板滑雪教學</title>
  <meta name="description" content="日本湯澤中文單板滑雪教學。台灣教練 Alben，NZSIA & SBINZ 國際證照，新手友善，提供滑行錄影分析與雪地攝影紀錄。" />
  <meta property="og:title" content="ALBEN SNOW｜日本湯澤中文單板滑雪教學" />
  <meta property="og:description" content="第一次單板滑雪也能安心上手。中文教學、國際證照、新手友善、雪地攝影紀錄。" />
  <meta property="og:image" content="assets/hero.jpg" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=Inter:wght@400;600;800;900&family=Caveat:wght@600;700&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#f7f8f8;
      --paper:#ffffff;
      --ink:#101215;
      --muted:#6b747d;
      --line:#e6edf1;
      --ice:#eaf5fb;
      --blue:#4e91c9;
      --blue-dark:#1d5f92;
      --sand:#c7a278;
      --shadow:0 22px 70px rgba(9,21,32,.12);
      --radius:28px;
    }
    *{box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{margin:0;background:var(--bg);color:var(--ink);font-family:'Inter','Noto Sans TC',sans-serif;line-height:1.75;letter-spacing:.01em}
    a{color:inherit;text-decoration:none}
    img{display:block;width:100%;height:100%;object-fit:cover}
    .wrap{width:min(1180px,calc(100% - 40px));margin:auto}
    .nav{position:fixed;z-index:50;top:0;left:0;right:0;background:rgba(255,255,255,.68);backdrop-filter:blur(18px);border-bottom:1px solid rgba(230,237,241,.72)}
    .nav-inner{height:72px;display:flex;align-items:center;justify-content:space-between;gap:20px}
    .brand{display:flex;align-items:center;gap:10px;font-weight:900;letter-spacing:.06em;font-size:15px}
    .brand-mark{width:42px;height:24px;position:relative;display:inline-block}
    .brand-mark:before,.brand-mark:after{content:"";position:absolute;bottom:4px;border-left:18px solid transparent;border-right:18px solid transparent;border-bottom:18px solid var(--ink)}
    .brand-mark:before{left:0;transform:scale(.72)}
    .brand-mark:after{right:0;transform:scale(.92)}
    .brand-mark i{position:absolute;bottom:4px;left:13px;width:18px;height:15px;background:var(--bg);clip-path:polygon(50% 0,100% 100%,0 100%)}
    .nav-links{display:flex;gap:28px;font-size:14px;font-weight:800;color:#3a4249}
    .btn{display:inline-flex;align-items:center;justify-content:center;border-radius:999px;padding:12px 19px;font-weight:900;font-size:14px;border:1px solid transparent;transition:.2s;white-space:nowrap}
    .btn:hover{transform:translateY(-2px)}
    .btn-primary{background:var(--blue);color:white;box-shadow:0 12px 28px rgba(78,145,201,.24)}
    .btn-dark{background:var(--ink);color:white}
    .btn-light{background:rgba(255,255,255,.9);border-color:rgba(255,255,255,.6)}
    .btn-ghost{border-color:rgba(16,18,21,.18);background:rgba(255,255,255,.7)}

    .hero{min-height:790px;padding-top:72px;position:relative;overflow:hidden;background-color:var(--bg);background-image:linear-gradient(90deg,rgba(247,248,248,.96) 0%,rgba(247,248,248,.84) 29%,rgba(247,248,248,.38) 40%,rgba(247,248,248,.08) 52%,rgba(247,248,248,0) 64%),url('assets/hero.jpg');background-position:left center,right center;background-size:100% 100%,auto 100%;background-repeat:no-repeat,no-repeat}
    /* 封面調整：人物靠右且照片清楚。若還想更靠右，可把 right center 改成 calc(100% + 80px) center；若想往左，改成 92% center。 */
    .hero .wrap{min-height:718px;display:grid;align-items:center}
    .hero-copy{max-width:510px;padding:76px 0 70px}
    .kicker{font-size:12px;text-transform:uppercase;letter-spacing:.18em;font-weight:900;color:var(--blue-dark);margin-bottom:16px}
    h1{font-size:clamp(44px,6.2vw,82px);line-height:.95;letter-spacing:.02em;margin:0 0 12px;font-weight:900}
    .script{font-family:'Caveat',cursive;color:var(--blue);font-size:clamp(40px,5vw,62px);line-height:.9;margin:0 0 24px}
    .hero-copy p{font-size:clamp(18px,2vw,23px);font-weight:800;margin:0 0 30px;color:#25313b}
    .hero-actions{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:38px}
    .hero-icons{display:grid;grid-template-columns:repeat(4,1fr);gap:0;width:min(500px,100%)}
    .hero-icon{padding:0 16px;text-align:center;border-left:1px solid rgba(16,18,21,.16)}
    .hero-icon:first-child{border-left:0;padding-left:0}
    .circle{width:52px;height:52px;margin:0 auto 10px;border:2px solid var(--ink);border-radius:50%;display:grid;place-items:center;font-size:24px;background:rgba(255,255,255,.52)}
    .hero-icon b{display:block;font-size:12px;line-height:1.35}.hero-icon span{font-size:11px;color:#59636c;font-weight:800}

    section{padding:86px 0}.section-title{display:flex;justify-content:space-between;align-items:end;gap:24px;margin-bottom:30px}.section-title h2{font-size:clamp(30px,4vw,50px);line-height:1.12;margin:0;letter-spacing:-.03em}.section-title p{margin:0;max-width:500px;color:var(--muted)}
    .story{padding:0;background:var(--paper)}
    .story-grid{display:grid;grid-template-columns:.76fr 1fr;min-height:460px}
    .story-copy{padding:78px 7vw 72px 0;align-self:center}.story-copy h2{font-size:clamp(30px,4vw,42px);line-height:1.25;margin:0 0 22px}.story-copy p{color:#4e5963;margin:0 0 26px}.story-photo{min-height:460px;background:url('assets/snow_story.jpg') center/cover no-repeat}

    .features{background:var(--ice);padding:62px 0;border-top:1px solid var(--line);border-bottom:1px solid var(--line)}
    .features h2{text-align:center;font-size:30px;margin:0 0 35px}.feature-grid{display:grid;grid-template-columns:repeat(4,1fr)}.feature{text-align:center;padding:12px 34px;border-left:1px solid rgba(116,149,170,.24)}.feature:first-child{border-left:0}.feature .ficon{font-size:34px;margin-bottom:12px}.feature b{display:block;font-size:17px}.feature p{font-size:14px;color:var(--muted);margin:8px 0 0}

    .about{background:var(--paper);padding:0}.about-grid{display:grid;grid-template-columns:.86fr 1.14fr;align-items:stretch}.about-copy{padding:78px 6vw 72px 0}.about-copy h2{font-size:46px;margin:6px 0 20px}.about-copy p{color:#4e5963;margin:0 0 24px}.about-list{display:grid;gap:10px;margin:0 0 28px}.about-list div{display:flex;gap:10px;color:#3f4a53}.about-list span{color:var(--blue);font-weight:900}.about-photo{min-height:540px;background:url('assets/hero_portrait.jpg') center/cover no-repeat}

    .location{background:linear-gradient(90deg,rgba(9,21,32,.70),rgba(9,21,32,.22)),url('assets/landscape.jpg') center/cover no-repeat;color:white;min-height:520px;display:grid;align-items:center}.location h2{font-size:clamp(42px,7vw,86px);line-height:.98;letter-spacing:-.05em;margin:0 0 20px}.location p{max-width:620px;font-size:20px;color:rgba(255,255,255,.84);margin:0 0 30px}.resorts{display:flex;gap:10px;flex-wrap:wrap}.resorts span{display:inline-flex;padding:8px 13px;border-radius:999px;background:rgba(255,255,255,.18);font-weight:900;font-size:13px;backdrop-filter:blur(8px)}

    .plans{background:var(--paper)}.plan-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}.plan{background:white;border:1px solid var(--line);border-radius:22px;padding:30px;text-align:left;box-shadow:0 12px 34px rgba(22,22,22,.04)}.plan.featured{border-color:rgba(78,145,201,.55);box-shadow:var(--shadow)}.plan h3{margin:0 0 12px;font-size:19px}.price{font-size:38px;font-weight:900;letter-spacing:-.04em;margin:0}.price small{font-size:16px;color:var(--blue);margin-right:4px}.plan p{margin:10px 0 0;color:var(--muted);font-size:14px}.plan ul{padding-left:18px;color:#3f4a53;font-size:14px;margin:18px 0 0}.note{text-align:center;color:var(--muted);margin-top:22px;font-size:14px}

    .gallery-grid{display:grid;grid-template-columns:1.1fr 1fr 1fr;grid-auto-rows:220px;gap:9px}.shot{overflow:hidden;background:#ddd;position:relative;border-radius:18px}.shot.big{grid-row:span 2}.shot.wide{grid-column:span 2}.shot img{transition:transform .45s}.shot:hover img{transform:scale(1.045)}
    .mini-gallery{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:10px}.mini-gallery .shot{height:235px}
    .video-section{background:var(--ice)}.video-card{border-radius:28px;overflow:hidden;border:1px solid var(--line);box-shadow:var(--shadow);background:#0b1117}.video-card video{display:block;width:100%;aspect-ratio:16/9;object-fit:cover}.video-note{font-size:14px;color:var(--muted);margin-top:16px;text-align:center}

    .reviews{background:var(--bg)}.review-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:18px}.review{background:white;border:1px solid var(--line);border-radius:18px;padding:24px;box-shadow:0 12px 34px rgba(22,22,22,.04)}.stars{color:var(--sand);letter-spacing:.06em}.review p{font-weight:700;line-height:1.6}.review small{color:var(--muted)}

    .booking{background:var(--paper);padding:72px 0}.booking-grid{display:grid;grid-template-columns:.95fr 1.05fr .8fr;gap:26px;align-items:stretch}.faq details{border-bottom:1px solid var(--line);padding:16px 0}.faq summary{font-weight:900;cursor:pointer}.faq p{color:var(--muted);margin:10px 0 0}.book-card{border-radius:28px;background:white;border:1px solid var(--line);padding:40px;text-align:center;box-shadow:var(--shadow)}.book-card h2{margin:0 0 14px;font-size:34px}.book-card p{color:var(--muted);margin:0 0 24px}.socials{display:flex;justify-content:center;gap:12px;flex-wrap:wrap}.line{background:#06c755;color:white}.ig{background:#e5487b;color:white}.wa{background:#25d366;color:white}.booking-photo{border-radius:28px;overflow:hidden;min-height:330px}
    .footer{background:#101215;color:white;padding:24px 0}.footer .wrap{display:flex;align-items:center;justify-content:space-between;gap:18px;color:rgba(255,255,255,.72);font-size:13px}.footer b{color:white}

    @media(max-width:920px){
      .nav-links{display:none}.nav-inner{height:64px}.hero{padding-top:64px;background-image:linear-gradient(180deg,rgba(247,248,248,.98) 0%,rgba(247,248,248,.82) 36%,rgba(247,248,248,.10) 62%,rgba(247,248,248,0) 100%),url('assets/hero_portrait.jpg');background-position:center top,center bottom;background-size:100% 100%,cover;background-repeat:no-repeat,no-repeat;min-height:840px}.hero .wrap{align-items:start}.hero-copy{padding-top:50px}.hero-icons{grid-template-columns:repeat(2,1fr);gap:14px}.hero-icon{border-left:0;border-top:1px solid rgba(22,22,22,.14);padding:16px}.story-grid,.about-grid,.booking-grid{grid-template-columns:1fr}.story-copy,.about-copy{padding:54px 0}.feature-grid{grid-template-columns:1fr 1fr}.feature{border-left:0;border-top:1px solid rgba(116,149,170,.24)}.gallery-grid{grid-template-columns:1fr 1fr;grid-auto-rows:190px}.shot.big,.shot.wide{grid-row:auto;grid-column:auto}.plan-grid,.review-grid{grid-template-columns:1fr 1fr}.mini-gallery{grid-template-columns:1fr 1fr}.location{min-height:500px}.footer .wrap{display:block;text-align:center}.footer b{display:block;margin-bottom:8px}}
    @media(max-width:560px){.wrap{width:calc(100% - 28px)}.brand{font-size:13px}.hero-copy p{font-size:18px}.hero-icons{grid-template-columns:1fr 1fr}.circle{width:46px;height:46px}.feature-grid,.plan-grid,.review-grid,.gallery-grid,.mini-gallery{grid-template-columns:1fr}.gallery-grid{grid-auto-rows:260px}.mini-gallery .shot{height:260px}.story-photo,.about-photo{min-height:360px}.book-card{padding:28px 20px}.btn{padding:11px 14px}.nav .btn{font-size:12px}h1{font-size:48px}.script{font-size:42px}}
  </style>
</head>
<body>
  <nav class="nav">
    <div class="wrap nav-inner">
      <a class="brand" href="#home"><span class="brand-mark"><i></i></span>ALBEN SNOW</a>
      <div class="nav-links">
        <a href="#about">教練介紹</a><a href="#plans">課程方案</a><a href="#gallery">作品集</a><a href="#video">影片紀錄</a><a href="#faq">FAQ</a><a href="#booking">聯絡我</a>
      </div>
      <a class="btn btn-primary" href="#booking">立即預約</a>
    </div>
  </nav>

  <header class="hero" id="home">
    <div class="wrap">
      <div class="hero-copy">
